name: Linux Strace gen2.elf

on:
  workflow_dispatch:

jobs:
  strace-gen2:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build gen1.elf + gen2.elf
        run: |
          PRESERVE=1 bash scripts/bootstrap-native.sh 2
          ls -la /tmp/yoyo-native-bs-*/
          TD=$(ls -dt /tmp/yoyo-native-bs-*/ | head -1)
          cp "$TD/gen1.elf" build/gen1.elf
          cp "$TD/gen2.elf" build/gen2.elf
          ls -la build/gen1.elf build/gen2.elf
        timeout-minutes: 2

      - name: Strace gen1.elf reading yoyo.ty
        run: |
          chmod +x build/gen1.elf
          cp projects/yoyo.ty input.ky
          set +e
          timeout --foreground --kill-after=10s 30s strace -f -o build/gen1.strace ./build/gen1.elf
          code=$?
          set -e
          echo "gen1.elf exited with $code"
          if [[ -f output ]]; then
            echo "gen1.elf produced output:"
            ls -la output
            cp output build/gen1-output.bin
          fi
        timeout-minutes: 3

      - name: Strace gen2.elf reading yoyo.ty
        run: |
          chmod +x build/gen2.elf
          rm -f output
          cp projects/yoyo.ty input.ky
          set +e
          # Run gen2.elf with strace. Capture strace log; concurrently record
          # periodic /proc/PID/syscall samples to local file for offline analysis.
          PROBE_FILE=build/gen2-probe.log
          : > "$PROBE_FILE"
          ( strace -f -o build/gen2.strace ./build/gen2.elf ) &
          STRACE_PID=$!
          echo "strace wrapper PID: $STRACE_PID"
          for i in $(seq 1 30); do
            sleep 2
            # find gen2.elf process
            found=0
            for pid in $(ls /proc/ 2>/dev/null | grep -E '^[0-9]+$'); do
              [[ ! -r "/proc/$pid/comm" ]] && continue
              comm=$(cat /proc/$pid/comm 2>/dev/null)
              if [[ "$comm" == *gen2* ]] || readlink "/proc/$pid/exe" 2>/dev/null | grep -q gen2; then
                ts=$(date +%s.%N)
                state=$(cat /proc/$pid/wchan 2>/dev/null)
                syscall=$(cat /proc/$pid/syscall 2>/dev/null | tr '\0' ' ')
                rip=$(cat /proc/$pid/stat 2>/dev/null | awk '{print "field39="$39}')
                stuck_count=0
                # Track if rip has changed since last sample
                last=$(grep "$pid" "$PROBE_FILE" 2>/dev/null | tail -1)
                if [[ -n "$last" ]] && [[ "$last" == *"$rip"* ]]; then
                  stuck_count=1
                fi
                echo "$ts PID=$pid comm=$comm wchan=$state syscall=$syscall rip=$rip stuck=$stuck_count" >> "$PROBE_FILE"
                found=1
              fi
            done
            [[ $found -eq 0 ]] && echo "$(date +%s.%N) no-gen2-process" >> "$PROBE_FILE"
            # exit early if strace subprocess no longer exists
            if ! kill -0 $STRACE_PID 2>/dev/null; then break; fi
          done
          # Kill strace if still running
          kill $STRACE_PID 2>/dev/null
          wait $STRACE_PID 2>/dev/null
          code=$?
          set -e
          echo "gen2.elf strace wrapper exit: $code"
          if [[ -f output ]]; then
            echo "gen2.elf produced output:"
            ls -la output
            cp output build/gen2-output.bin
          else
            echo "gen2.elf did NOT produce output"
          fi
        timeout-minutes: 4

      - name: Analyze probe data
        if: always()
        run: |
          echo "===== gen2.elf probe analysis ====="
          if [[ ! -f build/gen2-probe.log ]]; then
            echo "no probe data"; exit 0
          fi
          total=$(wc -l < build/gen2-probe.log)
          echo "total probe samples: $total"
          echo "first 5 samples:"
          head -5 build/gen2-probe.log
          echo "last 5 samples:"
          tail -5 build/gen2-probe.log
          echo "stuck count (samples with same rip as previous):"
          awk 'NR>1 { prev_rip=$(NF-1); cur_rip=$NF; if (prev_rip == cur_rip) print $0 }' build/gen2-probe.log 2>/dev/null | wc -l
          echo "rip change timeline (showing unique rip values):"
          awk '{print $NF}' build/gen2-probe.log | sort -u | head -10
        timeout-minutes: 1

      - name: Compare last 30 strace lines of gen1 vs gen2
        if: always()
        run: |
          echo "===== gen1.elf strace tail (last 30) ====="
          if [[ -f build/gen1.strace ]]; then tail -n 30 build/gen1.strace; else echo "no gen1.strace"; fi
          echo "===== gen2.elf strace tail (last 30) ====="
          if [[ -f build/gen2.strace ]]; then tail -n 30 build/gen2.strace; else echo "no gen2.strace"; fi
          echo "===== gen1.elf strace first call to open('input.ky'): ====="
          if [[ -f build/gen1.strace ]]; then grep -n -A 4 'open.*input.ky' build/gen1.strace | head -30; fi
          echo "===== gen2.elf strace first call to open('input.ky'): ====="
          if [[ -f build/gen2.strace ]]; then grep -n -A 4 'open.*input.ky' build/gen2.strace | head -30; fi
        timeout-minutes: 1

      - name: Upload artifacts (gen1.elf, gen2.elf, straces, outputs)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-gen2-strace-${{ github.run_id }}
          if-no-files-found: ignore
          path: |
            build/gen1.elf
            build/gen2.elf
            build/gen1.strace
            build/gen2.strace
            build/gen1-output.bin
            build/gen2-output.bin
          retention-days: 7

      - name: Upload artifacts (gen2.elf, strace, gen2-output)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-gen2-strace-${{ github.run_id }}
          if-no-files-found: ignore
          path: |
            build/gen2.elf
            build/gen2.strace
            build/gen2-output.bin
          retention-days: 7
