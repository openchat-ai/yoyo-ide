name: Linux Strace gen2.elf

on:
  workflow_dispatch:

jobs:
  strace-gen2:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build gen1.elf + gen2.elf
        run: |
          PRESERVE=1 bash scripts/bootstrap-native.sh 2
          ls -la /tmp/yoyo-native-bs-*/
          TD=$(ls -dt /tmp/yoyo-native-bs-*/ | head -1)
          GEN2="$TD/gen2.elf"
          cp "$GEN2" build/gen2.elf
          ls -la build/gen2.elf
        timeout-minutes: 2

      - name: Strace gen2.elf reading yoyo.ty
        run: |
          chmod +x build/gen2.elf
          ls -la build/gen2.elf
          cp projects/yoyo.ty input.ky
          set +e
          timeout --foreground --kill-after=10s 45s strace -f -o build/gen2.strace ./build/gen2.elf
          code=$?
          set -e
          echo "gen2.elf exited with $code"
          if [[ -f output ]]; then
            echo "gen2.elf DID produce output:"
            ls -la output
            cp output build/gen2-output.bin
          else
            echo "gen2.elf did NOT produce output"
          fi
          if [[ -f build/gen2.strace ]]; then
            echo "=== Last 50 strace events ==="
            tail -n 50 build/gen2.strace
            echo "=== syscall frequency (top 20) ==="
            awk '{print $1}' build/gen2.strace | grep -v "^$" | sort | uniq -c | sort -rn | head -20
            echo "=== strace line count ==="
            wc -l build/gen2.strace
          fi
        timeout-minutes: 5

      - name: Upload artifacts (gen2.elf, strace, gen2-output)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-gen2-strace-${{ github.run_id }}
          if-no-files-found: ignore
          path: |
            build/gen2.elf
            build/gen2.strace
            build/gen2-output.bin
          retention-days: 7
